    <div class="title">
        <h1 class="firstTitle">Search for a Pokemon!</h1>
    </div>

    <div class="form-container">
        <input type="text" id="pokemonSearch" placeholder="Enter a Pokemon's name" />
        <button id="getPokemon">See its details</button>
        <div id="pokemon"></div>
    </div>

    <script>
        pokemonName = document.getElementById("pokemonSearch");
        getPokemon.addEventListener('click', function(event) {
            displayPokemon(pokemonName.value.toLowerCase());
        });

        function fetchPokemon(pokemon) {
            return fetch('https://pokeapi.co/api/v2/pokemon/' + pokemon)    //add the pokemon's name to the url for the api to work
                .then((response) => response.json())
        }

        async function displayPokemon(pokemon) {
            const data = await fetchPokemon(pokemon)
            document.getElementById("pokemon").innerHTML = `
                <h1>Name: ${data.name.toUpperCase()}</h1>
                <h1>Height: ${data.height/10} meters</h1>
                <h1>Weight: ${data.weight/10} kilos</h1>
                <img src="${data.sprites.front_default}" alt="${data.name}"/>
                <h2>Original version</h2>
                <img src="${data.sprites.front_shiny}" alt="${data.name}"/>
                <h2>Shiny version</h2>
                `;
        }   //the API returns the height in decimeters and weight in hectograms
    </script>
