            <div>

            </div>

            <div class="radio-group">
                <p> Would you like to receive the newsletter on your email?</p>

                <label>
                    <input type="radio" name="newsletter" value="oui" id="oui"> Yes
                </label>
                
                <label>
                    <input type="radio" name="newsletter" value="non" id="non"> No
                </label>
            </div>

            <button type="submit">Subscribe</button>
            </form>
